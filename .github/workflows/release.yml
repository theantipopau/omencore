name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Read VERSION
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION.txt | Select-Object -First 1).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VERSION.txt must contain a version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer artifacts
        shell: pwsh
        run: ./build-installer.ps1 -Configuration Release -Runtime win-x64 -SingleFile

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $expected = @(
            "artifacts/OmenCore-$version-win-x64.zip",
            "artifacts/OmenCoreSetup-$version.exe"
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Expected artifact was not created: $path"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            artifacts/OmenCore-${{ steps.version.outputs.value }}-win-x64.zip
            artifacts/OmenCoreSetup-${{ steps.version.outputs.value }}.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          version=$(head -1 VERSION.txt | tr -d '\r\n ')
          if [ -z "$version" ]; then
            echo "VERSION.txt must contain a version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build Linux artifacts
        shell: pwsh
        run: ./build-linux-package.ps1 -Configuration Release -Runtime linux-x64

      - name: Verify Linux artifact
        shell: bash
        run: |
          artifact="artifacts/OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip"
          if [ ! -f "$artifact" ]; then
            echo "Expected artifact was not created: $artifact" >&2
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            artifacts/OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip
            artifacts/OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip.sha256
            artifacts/version.json

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          version=$(head -1 VERSION.txt | tr -d '\r\n ')
          if [ -z "$version" ]; then
            echo "VERSION.txt must contain a version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/OmenCore-${{ steps.version.outputs.value }}-win-x64.zip
            artifacts/OmenCoreSetup-${{ steps.version.outputs.value }}.exe
            artifacts/OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip
            artifacts/OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip.sha256
          body: |
            ## OmenCore ${{ github.ref_name }}

            ### Downloads
            - **Windows Installer**: `OmenCoreSetup-${{ steps.version.outputs.value }}.exe` (recommended)
            - **Windows Portable**: `OmenCore-${{ steps.version.outputs.value }}-win-x64.zip`
            - **Linux (CLI + Avalonia GUI)**: `OmenCore-${{ steps.version.outputs.value }}-linux-x64.zip`

            ### System Requirements
            - **Windows**: Windows 10/11 (x64), .NET 8 runtime is bundled in shipped artifacts
            - **Linux**: x64, kernel modules: `ec_sys` (write_support=1), `hp-wmi`
            - HP OMEN or Victus gaming laptop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
