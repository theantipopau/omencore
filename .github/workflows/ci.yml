name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "OmenCore.sln"

      - name: Build
        run: dotnet build "OmenCore.sln" -c Debug --no-restore

      - name: Run tests
        env:
          OMENCORE_DISABLE_FILE_LOG: '1'
        run: |
          dotnet test "OmenCore.sln" -c Debug --no-build --logger "console;verbosity=normal"

  wmi-v2-tests:
    name: WMI V2 focused tests (unit)
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: |
          dotnet restore "OmenCore.sln"
          dotnet build "OmenCore.sln" -c Debug --no-restore
      - name: Run WMI-V2 tests
        env:
          OMENCORE_DISABLE_FILE_LOG: '1'
        run: |
          dotnet test "OmenCore.sln" -c Debug --no-build --filter FullyQualifiedName~WmiV2VerificationTests|FullyQualifiedName~HpWmiBiosRpmParsingTests --logger "console;verbosity=minimal"

  integration-tests:
    name: Integration tests (quick-profile stress + diagnostics E2E)
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: |
          dotnet restore "OmenCore.sln"
          dotnet build "OmenCore.sln" -c Debug --no-restore
      - name: Run integration tests
        env:
          OMENCORE_DISABLE_FILE_LOG: '1'
        run: |
          dotnet test "OmenCore.sln" -c Debug --no-build --filter FullyQualifiedName~FanSmoothingTests.QuickProfileSwitching_Stress_LongRun|FullyQualifiedName~ModelReportServiceTests.CreateModelDiagnosticBundleAsync_CreatesZipAndReturnsPath|FullyQualifiedName~FanControllerEcWatchdogTests|FullyQualifiedName~FanControllerEcRateTests --logger "console;verbosity=minimal"

  model-database-submissions:
    name: Validate community model-database submissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate any submitted model JSON files
        run: |
          shopt -s nullglob
          files=(docs/model-database/submissions/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No submission files present, nothing to validate."
            exit 0
          fi
          status=0
          for f in "${files[@]}"; do
            echo "Validating $f"
            python3 docs/model-database/validate_model_submission.py "$f" \
              --existing-db src/OmenCoreApp/Hardware/ModelCapabilityDatabase.cs || status=1
          done
          exit $status
